<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dummy — trajectory viewer</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css">
</head>
<body>

<svg hidden aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-click" viewBox="0 0 16 16"><path d="M3.5 2.5 12.5 7.7 8.4 9 6.6 13.5Z" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></symbol>
  <symbol id="i-type" viewBox="0 0 16 16"><path d="M5 3h6M5 13h6M8 3v10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
  <symbol id="i-select" viewBox="0 0 16 16"><path d="M5 6.2 8 3.2l3 3M5 9.8l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-scroll" viewBox="0 0 16 16"><path d="M8 2.5v11M5 5.2 8 2.2l3 3M5 10.8l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-nav" viewBox="0 0 16 16"><path d="M4 12 12 4M6 4h6v6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-wait" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.6" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.2l2.2 1.6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
  <symbol id="i-done" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.6" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="m5.4 8.2 1.9 1.9 3.4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-giveup" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.6" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 11.5l7-7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
  <symbol id="i-check" viewBox="0 0 16 16"><path d="m3 8.6 3.4 3.4L13 4.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-x" viewBox="0 0 16 16"><path d="m4 4 8 8M12 4l-8 8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="i-warn" viewBox="0 0 16 16"><path d="M8 2.6 14.6 13.4H1.4Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 6.6v3M8 11.6v.1" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
  <symbol id="i-branch" viewBox="0 0 16 16"><circle cx="4.5" cy="3.6" r="1.7" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="4.5" cy="12.4" r="1.7" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="11.5" cy="5.6" r="1.7" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M4.5 5.3v5.4M11.5 7.3c0 2.6-2.6 3.4-5 3.6" fill="none" stroke="currentColor" stroke-width="1.4"/></symbol>
  <symbol id="i-film" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="10" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M5 3v10M11 3v10M2 6h3M2 10h3M11 6h3M11 10h3" fill="none" stroke="currentColor" stroke-width="1.2"/></symbol>
  <symbol id="i-play" viewBox="0 0 16 16"><path d="M5.2 3.2 12.4 8l-7.2 4.8Z" fill="currentColor"/></symbol>
  <symbol id="i-eye" viewBox="0 0 16 16"><path d="M1.8 8S4.2 3.8 8 3.8 14.2 8 14.2 8 11.8 12.2 8 12.2 1.8 8 1.8 8Z" fill="none" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="8" r="1.9" fill="currentColor"/></symbol>
  <symbol id="i-net" viewBox="0 0 16 16"><path d="M2 4.5h7M2 8h11M2 11.5h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="i-token" viewBox="0 0 16 16"><path d="M8 2.2 13.4 8 8 13.8 2.6 8Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></symbol>
  <symbol id="i-gauge" viewBox="0 0 16 16"><path d="M2.4 12.4a6 6 0 0 1 11.2 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="m8 12 2.6-3.6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
  <symbol id="i-cursor" viewBox="0 0 24 24"><path d="M5 3 19 11.2 12.6 12.8 9.8 19Z" fill="#f4f2ec" stroke="#0b0c0e" stroke-width="1.6" stroke-linejoin="round"/></symbol>
</svg>

<div id="app" hidden>
  <header id="topbar">
    <div class="brand">
      <span class="brand-name">Dummy</span>
      <span class="brand-sub">trajectory<br>viewer</span>
    </div>
    <div class="case-block">
      <div class="case-id" id="case-id"></div>
      <div class="badges" id="run-badges"></div>
    </div>
    <div class="spark" id="spark" hidden>
      <div class="spark-label" id="spark-label"></div>
      <div id="spark-svg"></div>
    </div>
    <div class="cost" id="cost-strip"></div>
  </header>

  <main id="layout">
    <section id="stage-col">
      <nav id="stage-tabs">
        <button data-view="stills" class="tab on"><svg class="ic"><use href="#i-film"/></svg>Stills</button>
        <button data-view="a11y" class="tab"><svg class="ic"><use href="#i-eye"/></svg>Agent view</button>
        <button data-view="video" class="tab"><svg class="ic"><use href="#i-play"/></svg>Video</button>
        <button data-view="diff" class="tab" id="tab-diff" hidden><svg class="ic"><use href="#i-branch"/></svg>Diff</button>
        <span class="tabs-hint">←/→ steps · V agent view</span>
      </nav>

      <div id="stage">
        <div class="pane" id="pane-stills">
          <div class="shot-wrap" id="shot-wrap">
            <img id="shot" alt="step screenshot">
            <div id="ghost"><svg class="ghost-arrow" width="22" height="22"><use href="#i-cursor"/></svg><span class="ring" id="ghost-ring"></span></div>
          </div>
          <div class="placeholder" id="shot-missing" hidden></div>
        </div>
        <div class="pane" id="pane-a11y" hidden><pre id="a11y-pre"></pre></div>
        <div class="pane" id="pane-video" hidden>
          <div class="video-box">
            <video id="video" controls preload="metadata"></video>
            <div class="vmarks" id="vmarks"></div>
          </div>
          <div class="placeholder" id="video-missing" hidden></div>
        </div>
        <div class="pane" id="pane-diff" hidden><div id="diff-body"></div></div>
      </div>

      <div id="caption">
        <div id="cap-fade">
          <div class="cap-meta" id="cap-meta"></div>
          <p class="cap-thought" id="cap-thought"></p>
          <p class="cap-expect" id="cap-expect"></p>
        </div>
      </div>
    </section>

    <aside id="inspector"></aside>
  </main>

  <footer id="strip-zone">
    <div class="perfo"></div>
    <div id="strip"></div>
    <div class="perfo"></div>
  </footer>
</div>

<div id="picker" hidden></div>
<div id="fatal" hidden></div>

<script type="module" src="app.js"></script>
</body>
</html>
