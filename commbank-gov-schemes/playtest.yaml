# Suite: CommBank government home-buying scheme selector.
# An external, public, read-only informational tool — no login, no transactions,
# nothing the actor can mutate. Journey regression: the first run records a
# baseline path; later runs replay it and re-check the gate, so you get told if
# the tool stops giving this persona the right answer.
mode: journey
actor_model: claude-sonnet-4-6   # a live multi-question wizard on a real site; haiku is too weak for the free-form inputs
timeout: "6m"                    # third-party production site — slower page loads than a local app
app:
  driver: web
  base_url: https://www.commbank.com.au/retail/netbank/home-buying/tools/government-scheme-selector
