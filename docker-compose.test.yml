services:
  app:
    build: ./src/todo-app
    ports:
      # Container port 4173 on an ephemeral host port, so parallel compose
      # projects don't collide; the harness resolves it via `docker compose port`.
      - "4173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4173/"]
      interval: 2s
      timeout: 2s
      retries: 15
